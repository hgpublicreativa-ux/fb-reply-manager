name: Sync Facebook comments

on:
  schedule:
    # Ecuador es UTC-5: 13:00 UTC = 8:00am, 23:00 UTC = 6:00pm hora local
    - cron: "0 13 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar /sync (despierta el contenedor serverless y sincroniza)
        run: |
          curl -sf -m 300 -X POST \
            -H "Authorization: Bearer ${{ secrets.SYNC_TOKEN }}" \
            "https://fb-reply-manager-production.up.railway.app/sync" \
            && echo "Sync OK" || (echo "Sync falló" && exit 1)
